<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  /* === Reset & base === */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green:     #2D6A4F;
    --green-mid: #40916C;
    --green-lt:  #D8F3DC;
    --earth:     #7C4A1E;
    --earth-lt:  #F5E6DA;
    --cream:     #FAFAF7;
    --ink:       #1A1A18;
    --muted:     #6B6B60;
    --border:    #E0DFD6;
    --white:     #FFFFFF;
    --red-lt:    #FDECEA;
    --red:       #C0392B;
    --amber-lt:  #FEF3CD;
    --amber:     #856404;
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 16px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--cream);
    color: var(--ink);
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* === Layout === */
  .container { max-width: 860px; margin: 0 auto; padding: 0 1.25rem; }

  /* === Header === */
  header {
    background: var(--green);
    color: #fff;
    padding: 1.25rem 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 1px 8px rgba(0,0,0,.15);
  }
  .header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }
  .logo {
    font-family: 'Lora', Georgia, serif;
    font-size: 1.35rem;
    font-weight: 600;
    letter-spacing: -.01em;
    display: flex;
    align-items: center;
    gap: .5rem;
  }
  .logo span { font-size: 1.5rem; }

  /* === Sections === */
  .section { display: none; }
  .section.active { display: block; }

  /* === Shop hero === */
  .shop-hero {
    background: linear-gradient(135deg, var(--green) 0%, var(--green-mid) 100%);
    color: #fff;
    padding: 2.5rem 0 2rem;
    margin-bottom: 2rem;
  }
  .shop-hero h1 {
    font-family: 'Lora', Georgia, serif;
    font-size: 2rem;
    font-weight: 600;
    margin-bottom: .4rem;
  }
  .shop-hero p { color: rgba(255,255,255,.8); font-size: .95rem; }

  /* === Availability notice === */
  .notice {
    display: flex;
    align-items: center;
    gap: .75rem;
    background: var(--green-lt);
    border: 1px solid #95D5B2;
    border-radius: var(--radius-md);
    padding: .75rem 1rem;
    font-size: .875rem;
    color: var(--green);
    margin-bottom: 1.5rem;
  }
  .notice .icon { font-size: 1.25rem; flex-shrink: 0; }

  /* === Product grid === */
  .products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px;
    margin-bottom: 2rem;
  }
  .product-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.1rem 1rem 1rem;
    display: flex;
    flex-direction: column;
    transition: box-shadow .15s;
  }
  .product-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.07); }
  .product-emoji { font-size: 2.2rem; margin-bottom: .6rem; line-height: 1; }
  .product-name { font-weight: 500; font-size: .95rem; margin-bottom: 2px; }
  .product-name-clickable { cursor: pointer; transition: color .12s; }
  .product-name-clickable:hover { color: var(--green); text-decoration: underline; }
  .product-price { font-size: .85rem; color: var(--green); font-weight: 500; margin-bottom: 2px; }
  .product-unit { font-size: .8rem; color: var(--muted); margin-bottom: .9rem; }
  .qty-ctrl {
    display: flex;
    align-items: center;
    gap: .5rem;
    margin-top: auto;
  }
  .qty-btn {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--cream);
    font-size: 1.1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink);
    line-height: 1;
    transition: background .12s;
  }
  .qty-btn:hover { background: var(--green-lt); border-color: #95D5B2; }
  .qty-num {
    font-size: .9rem;
    font-weight: 500;
    min-width: 24px;
    text-align: center;
  }

  /* === Info button on product card === */
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; }
  .info-btn {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--cream);
    color: var(--muted);
    font-size: .8rem;
    font-weight: 600;
    font-family: 'Lora', serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all .12s;
  }
  .info-btn:hover { background: var(--green); color: #fff; border-color: var(--green); }

  /* === Product modal === */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(26,26,24,.55);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    z-index: 1000;
    animation: fadeIn .15s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal-box {
    background: var(--white);
    border-radius: var(--radius-lg);
    max-width: 440px;
    width: 100%;
    max-height: 88vh;
    overflow-y: auto;
    position: relative;
    animation: modalUp .2s ease;
  }
  @keyframes modalUp { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-img-wrap {
    width: 100%;
    height: 220px;
    background: var(--green-lt);
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    overflow: hidden;
  }
  .modal-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .modal-img-wrap .modal-emoji-fallback { font-size: 5rem; }
  .modal-close {
    position: absolute;
    top: .75rem;
    right: .75rem;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,.9);
    color: var(--ink);
    font-size: 1.1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,.15);
  }
  .modal-close:hover { background: #fff; }
  .modal-body { padding: 1.4rem 1.5rem 1.6rem; }
  .modal-title {
    font-family: 'Lora', serif;
    font-size: 1.3rem;
    font-weight: 600;
    margin-bottom: .2rem;
  }
  .modal-price-line { font-size: .85rem; color: var(--green); font-weight: 500; margin-bottom: 1.1rem; }
  .modal-section { margin-bottom: 1.1rem; }
  .modal-section:last-child { margin-bottom: 0; }
  .modal-section-title {
    font-size: .78rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .04em;
    color: var(--green);
    margin-bottom: .35rem;
    display: flex;
    align-items: center;
    gap: .4rem;
  }
  .modal-section-text { font-size: .9rem; color: var(--ink); line-height: 1.55; }
  .modal-empty { font-size: .85rem; color: var(--muted); font-style: italic; }
  .recipe-list { display: flex; flex-direction: column; gap: 8px; }
  .recipe-link {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: .65rem .9rem;
    background: var(--green-lt);
    border-radius: var(--radius-md);
    text-decoration: none;
    color: var(--green);
    font-size: .875rem;
    font-weight: 500;
    transition: background .12s;
  }
  .recipe-link:hover { background: #C2EBD2; }
  .recipe-arrow { font-size: .9rem; }

  /* === Cart bar === */
  .cart-bar {
    position: sticky;
    bottom: 1rem;
    background: var(--green);
    color: #fff;
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 4px 20px rgba(45,106,79,.35);
    animation: slideUp .2s ease;
    margin-bottom: 1rem;
  }
  @keyframes slideUp { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .cart-total { font-family: 'Lora', serif; font-size: 1.2rem; font-weight: 600; }
  .cart-count { font-size: .8rem; opacity: .8; margin-top: 1px; }
  .btn-cart {
    background: #fff;
    color: var(--green);
    border: none;
    padding: .65rem 1.4rem;
    border-radius: var(--radius-md);
    font-size: .9rem;
    font-weight: 500;
    cursor: pointer;
    transition: background .12s;
  }
  .btn-cart:hover { background: var(--green-lt); }

  /* === Checkout / form === */
  .checkout-wrap { max-width: 600px; margin: 0 auto; padding: 2rem 0; }
  .card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    margin-bottom: 1.25rem;
  }
  .card-title {
    font-family: 'Lora', serif;
    font-size: 1.05rem;
    font-weight: 600;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: .5rem;
  }
  .order-line {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: .5rem 0;
    border-bottom: 1px solid var(--border);
    font-size: .875rem;
  }
  .order-line:last-child { border-bottom: none; }
  .order-line-name { display: flex; align-items: center; gap: .5rem; }
  .order-line-price { color: var(--muted); }
  .order-total {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: .75rem;
    padding-top: .75rem;
    border-top: 2px solid var(--ink);
    font-weight: 500;
    font-size: 1rem;
  }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .form-row.full { grid-template-columns: 1fr; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group label { font-size: .8rem; font-weight: 500; color: var(--muted); }
  .form-group input,
  .form-group textarea,
  .form-group select {
    padding: .6rem .75rem;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--cream);
    color: var(--ink);
    font-family: inherit;
    font-size: .9rem;
    outline: none;
    transition: border-color .12s;
  }
  .form-group input:focus,
  .form-group textarea:focus,
  .form-group select:focus { border-color: var(--green); background: #fff; }
  .form-group textarea { resize: vertical; min-height: 80px; }
  .form-actions { display: flex; gap: .75rem; margin-top: .5rem; }
  .btn-back {
    padding: .65rem 1.2rem;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    background: transparent;
    font-size: .875rem;
    cursor: pointer;
    color: var(--ink);
  }
  .btn-back:hover { background: var(--cream); }
  .btn-primary {
    flex: 1;
    padding: .7rem 1.4rem;
    border: none;
    border-radius: var(--radius-md);
    background: var(--green);
    color: #fff;
    font-size: .9rem;
    font-weight: 500;
    cursor: pointer;
    transition: background .12s;
  }
  .btn-primary:hover { background: var(--green-mid); }

  /* === Success === */
  .success-screen {
    max-width: 480px;
    margin: 4rem auto;
    text-align: center;
    padding: 0 1rem;
  }
  .success-icon { font-size: 4rem; margin-bottom: 1rem; }
  .success-screen h2 {
    font-family: 'Lora', serif;
    font-size: 1.6rem;
    font-weight: 600;
    margin-bottom: .5rem;
  }
  .success-screen p { color: var(--muted); margin-bottom: 1.5rem; }

  /* === Admin === */
  .admin-hero {
    background: var(--earth-lt);
    border-bottom: 1px solid #DCC5B2;
    padding: 1.5rem 0;
    margin-bottom: 2rem;
  }
  .admin-hero h1 {
    font-family: 'Lora', serif;
    font-size: 1.5rem;
    font-weight: 600;
    color: var(--earth);
  }
  .admin-hero p { font-size: .875rem; color: var(--muted); margin-top: .2rem; }

  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 1.75rem; }
  .stat-box {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 1rem;
    text-align: center;
  }
  .stat-val { font-family: 'Lora', serif; font-size: 1.75rem; font-weight: 600; }
  .stat-val.green { color: var(--green); }
  .stat-val.earth { color: var(--earth); }
  .stat-lbl { font-size: .75rem; color: var(--muted); margin-top: 3px; }

  .section-title {
    font-family: 'Lora', serif;
    font-size: 1.05rem;
    font-weight: 600;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .admin-products { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; margin-bottom: 1rem; }
  .admin-prod-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: .9rem 1rem;
    display: flex;
    align-items: center;
    gap: .75rem;
  }
  .admin-prod-info { flex: 1; min-width: 0; }
  .admin-prod-name { font-size: .875rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .admin-prod-price { font-size: .78rem; color: var(--muted); }
  .btn-edit-info {
    font-size: .76rem;
    padding: 4px 8px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--cream);
    color: var(--muted);
    cursor: pointer;
    width: 100%;
  }
  .btn-edit-info:hover { border-color: var(--green); color: var(--green); background: var(--green-lt); }

  .btn-add {
    padding: .55rem 1rem;
    border: 1px dashed var(--border);
    border-radius: var(--radius-md);
    background: transparent;
    font-size: .85rem;
    cursor: pointer;
    color: var(--muted);
    transition: all .12s;
  }
  .btn-add:hover { border-color: var(--green); color: var(--green); background: var(--green-lt); }

  /* === Orders list === */
  .orders-list { display: flex; flex-direction: column; gap: 10px; margin-top: 1rem; }
  .order-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 1rem 1.1rem;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    align-items: start;
  }
  .order-head { display: flex; align-items: center; gap: .5rem; margin-bottom: 4px; }
  .order-name-text { font-weight: 500; font-size: .9rem; }
  .badge {
    font-size: .72rem;
    padding: 2px 7px;
    border-radius: 20px;
    font-weight: 500;
  }
  .badge.new { background: var(--amber-lt); color: var(--amber); }
  .badge.confirmed { background: var(--green-lt); color: var(--green); }
  .badge.delivered { background: #E8E8E8; color: #555; }
  .order-meta-text { font-size: .78rem; color: var(--muted); margin-bottom: 4px; }
  .order-items-text { font-size: .78rem; color: var(--muted); }
  .order-note { font-size: .78rem; color: var(--muted); font-style: italic; margin-top: 4px; }
  .order-right { display: flex; flex-direction: column; align-items: flex-end; gap: .5rem; }
  .order-total-text { font-family: 'Lora', serif; font-size: 1rem; font-weight: 600; }
  .status-sel {
    font-size: .78rem;
    padding: 4px 6px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--cream);
    cursor: pointer;
  }
  .btn-del {
    font-size: .75rem;
    color: var(--red);
    border: 1px solid #F5C6C6;
    border-radius: var(--radius-sm);
    background: transparent;
    padding: 3px 8px;
    cursor: pointer;
  }
  .btn-del:hover { background: var(--red-lt); }

  .delivery-selector {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 1rem;
  }
  .delivery-opt {
    border: 1.5px solid var(--border);
    border-radius: var(--radius-md);
    padding: .9rem 1rem;
    cursor: pointer;
    transition: all .15s;
    background: var(--cream);
    text-align: left;
  }
  .delivery-opt:hover { border-color: var(--green); background: var(--green-lt); }
  .delivery-opt.selected { border-color: var(--green); background: var(--green-lt); }
  .delivery-opt .opt-icon { font-size: 1.4rem; margin-bottom: .3rem; }
  .delivery-opt .opt-label { font-size: .9rem; font-weight: 500; color: var(--ink); }
  .delivery-opt .opt-sub { font-size: .78rem; color: var(--muted); margin-top: 2px; }
  .delivery-opt.selected .opt-label { color: var(--green); }
  
  .empty-state .e-icon { font-size: 2.5rem; margin-bottom: .5rem; }

  /* === Auth wall === */
  .auth-wall {
    max-width: 360px;
    margin: 4rem auto;
    text-align: center;
    padding: 0 1rem;
  }
  .auth-wall h2 { font-family: 'Lora', serif; font-size: 1.4rem; margin-bottom: .5rem; }
  .auth-wall p { color: var(--muted); font-size: .875rem; margin-bottom: 1.5rem; }
  .auth-form { display: flex; flex-direction: column; gap: .75rem; }
  .auth-form input {
    padding: .7rem .85rem;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    background: var(--cream);
    font-family: inherit;
    font-size: .9rem;
  }
  .auth-form input:focus { outline: none; border-color: var(--green); }

  /* === Footer === */
  footer {
    text-align: center;
    padding: 2rem 1rem;
    font-size: .78rem;
    color: var(--muted);
    border-top: 1px solid var(--border);
    margin-top: 3rem;
  }

  /* === Responsive === */
  @media (max-width: 520px) {
    .products-grid { grid-template-columns: repeat(2, 1fr); }
    .form-row { grid-template-columns: 1fr; }
    .stats-row { grid-template-columns: repeat(3, 1fr); }
    .shop-hero h1 { font-size: 1.4rem; }
    .logo { font-size: 1.1rem; }
    .admin-products { grid-template-columns: repeat(2, 1fr); }
  }

  @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
</style>
</head>

const AUTH_KEY = 'ortolano_auth';
let cart     = {};
let view     = 'list'; 
let products = [];
let orders   = [];
const IS_ADMIN_MODE = window.location.search.includes('admin');

function isAuth(){ return sessionStorage.getItem(AUTH_KEY)==='1'; }
function setAuth(v){ if(v) sessionStorage.setItem(AUTH_KEY,'1'); else sessionStorage.removeItem(AUTH_KEY); }

/* ========================================================================= */
/* 3. SINCRONIZZAZIONE FIREBASE IN TEMPO REALE                               */
/* ========================================================================= */

// Sincronizza Ordini
db.collection("orders").onSnapshot((snapshot) => {
  orders = []; 
  snapshot.forEach((doc) => orders.push(doc.data()));
  orders.sort((a,b) => b.id.localeCompare(a.id)); 
  
  if(document.getElementById('admin') && document.getElementById('admin').classList.contains('active')){
    renderAdmin();
  }
});

// Sincronizza Prodotti
db.collection("products").onSnapshot((snapshot) => {
  if (snapshot.empty) {
    // Se il database è vuoto, carica la lista iniziale
    DEFAULT_PRODUCTS.forEach(p => {
      db.collection("products").doc(p.id.toString()).set(p);
    });
    return;
  }
  
  products = [];
  snapshot.forEach((doc) => products.push(doc.data()));
  products.sort((a,b) => a.id - b.id);
  
  if (document.getElementById('shop') && document.getElementById('shop').classList.contains('active')) renderShop();
  if (document.getElementById('admin') && document.getElementById('admin').classList.contains('active')) renderAdmin();
});

/* ========================================================================= */
/* 4. GESTIONE SHOP E CHECKOUT (LATO CLIENTE)                                */
/* ========================================================================= */

function renderShop(){
  const el = document.getElementById('shop-content');
  
  // Schermata di successo
  if(view==='success'){
    el.innerHTML = `
      <div class="success-screen">
        <div class="success-icon">🌿</div>
        <h2>Ordine ricevuto!</h2>
        <p>Grazie! Riceverai presto conferma. Ti contatterò per organizzare la consegna.</p>
        <button class="btn-primary" style="width:100%;max-width:220px;" onclick="resetShop()">Nuovo ordine</button>
      </div>`;
    return;
  }
  
  // Schermata checkout
  if(view==='checkout'){ renderCheckout(el); return; }

  // Filtra i prodotti
  const avail = products.filter(p => p.available && !p.comingSoon);
  const coming = products.filter(p => p.comingSoon);
  
  const inCart = products.filter(p => cart[p.id] > 0);
  const total  = inCart.reduce((s,p) => s + cart[p.id] * p.price, 0);
  const count  = Object.values(cart).reduce((a,b) => a + b, 0);

  el.innerHTML = `
    <div class="notice">
      <span class="icon">🌱</span>

    <h2 class="section-title" style="margin-bottom: 1rem; font-size: 1.2rem;">🥦 Disponibili questa settimana</h2>
    <div class="products-grid" role="list" style="margin-bottom: 2.5rem;">
      ${avail.map(p => `
        <div class="product-card" role="listitem">
          <div class="card-top">
            <div class="product-emoji" aria-hidden="true">${p.img ? `<img src="${p.img}" alt="${p.name}" style="width:48px;height:48px;object-fit:cover;border-radius:8px;">` : p.emoji}</div>
            <button class="info-btn" onclick="openProductInfo(${p.id})" aria-label="Informazioni su ${p.name}">i</button>
          </div>
          <div class="product-name product-name-clickable" onclick="openProductInfo(${p.id})">${p.name}</div>
          <div class="product-price">€${p.price.toFixed(2)}</div>
          <div class="product-unit">al ${p.unit}</div>
          <div class="qty-ctrl" role="group" aria-label="Quantità ${p.name}">
            <button class="qty-btn" onclick="changeQty(${p.id},-1)" aria-label="Diminuisci">−</button>
            <span class="qty-num" id="qty-${p.id}" aria-live="polite">${cart[p.id]||0}</span>
            <button class="qty-btn" onclick="changeQty(${p.id},1)" aria-label="Aumenta">+</button>
          </div>
        </div>`).join('')}
    </div>

    ${coming.length > 0 ? `
      <h2 class="section-title" style="margin-bottom: 1rem; font-size: 1.2rem; color: var(--muted);">🚀 In arrivo prossimamente</h2>
      <div class="products-grid" role="list">
        ${coming.map(p => `
          <div class="product-card" role="listitem" style="opacity: 0.75; background: #fcfcf9;">
            <div class="product-emoji" aria-hidden="true" style="filter: grayscale(20%);">${p.emoji}</div>
            <div class="product-name" style="color: var(--muted);">${p.name}</div>
            <div class="product-price" style="color: var(--muted);">Disponibile a breve</div>
            <div class="product-unit">al ${p.unit}</div>
            <div style="margin-top: auto; font-size: 0.75rem; color: #856404; background: #fef3cd; padding: 5px; border-radius: var(--radius-sm); text-align: center; font-weight: 500;">
              ⏳ Non ancora ordinabile
            </div>
          </div>`).join('')}
      </div>
    ` : ''}

    ${count > 0 ? `
      <div class="cart-bar" role="complementary" aria-label="Carrello">
        <div>
          <div class="cart-total">€${total.toFixed(2)}</div>
          <div class="cart-count">${count} ${count===1?'prodotto':'prodotti'} selezionati</div>
        </div>
        <button class="btn-cart" onclick="goCheckout()">Procedi →</button>
      </div>` : ''}`;
}

function changeQty(id, d){
  cart[id] = (cart[id]||0) + d;
  if(cart[id] < 0) cart[id] = 0;
  renderShop();
}

function openProductInfo(id){
  const p = products.find(pr => pr.id === id);
  if(!p) return;
  const root = document.getElementById('product-modal-root');
  const hasDesc = p.description && p.description.trim();
  const recipes = [
    {name: p.recipe1Name, url: p.recipe1Url},
    {name: p.recipe2Name, url: p.recipe2Url},
    {name: p.recipe3Name, url: p.recipe3Url},
  ].filter(r => r.name && r.name.trim() && r.url && r.url.trim());

  root.innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeProductInfo()">
      <div class="modal-box" role="dialog" aria-modal="true" aria-label="${p.name}">
        <div class="modal-img-wrap">
          ${p.img
            ? `<img src="${p.img}" alt="${p.name}">`
            : `<span class="modal-emoji-fallback" aria-hidden="true">${p.emoji}</span>`}
        </div>
        <button class="modal-close" onclick="closeProductInfo()" aria-label="Chiudi">✕</button>
        <div class="modal-body">
          <div class="modal-title">${p.name}</div>
          <div class="modal-price-line">€${p.price.toFixed(2)} al ${p.unit}</div>

          <div class="modal-section">
            <div class="modal-section-title">🌱 Descrizione</div>
            <div class="modal-section-text">${hasDesc ? p.description : '<span class="modal-empty">Nessuna descrizione disponibile per questo prodotto.</span>'}</div>
          </div>

          <div class="modal-section">
            <div class="modal-section-title">🍽️ Idee di utilizzo</div>
            ${recipes.length > 0
              ? `<div class="recipe-list">${recipes.map(r => `
                  <a class="recipe-link" href="${r.url}" target="_blank" rel="noopener noreferrer">
                    <span>${r.name}</span><span class="recipe-arrow">↗</span>
                  </a>`).join('')}</div>`
              : '<div class="modal-section-text"><span class="modal-empty">Nessuna ricetta disponibile per questo prodotto.</span></div>'}
          </div>
        </div>
      </div>
    </div>`;
  document.addEventListener('keydown', closeProductInfoOnEsc);
}

function closeProductInfoOnEsc(e){
  if(e.key === 'Escape') closeProductInfo();
}

function closeProductInfo(){
  document.getElementById('product-modal-root').innerHTML = '';
  document.removeEventListener('keydown', closeProductInfoOnEsc);
}

function goCheckout(){
  if(!Object.values(cart).some(v=>v>0)) return;
  view = 'checkout';
  renderShop();
}

function renderCheckout(el){
  const inCart = products.filter(p=>cart[p.id]>0);
  const subtotal = inCart.reduce((s,p)=>s+cart[p.id]*p.price, 0);
  const delivery = window._delivery || 'ritiro';
  const surcharge = delivery === 'consegna' ? 2.00 : 0;
  const total = subtotal + surcharge;

  el.innerHTML = `
    <div class="checkout-wrap">
      <div class="card">
        <div class="card-title">📋 Riepilogo ordine</div>
        ${inCart.map(p=>`
          <div class="order-line">
            <span class="order-line-name">${p.emoji} ${p.name} ×${cart[p.id]}</span>
            <span class="order-line-price">€${(cart[p.id]*p.price).toFixed(2)}</span>
          </div>`).join('')}
        ${delivery === 'consegna' ? `
          <div class="order-line" style="color:var(--muted)">
            <span>🚚 Contributo consegna</span><span>€2.00</span>
          </div>` : ''}
        <div class="order-total"><span>Totale</span><span>€${total.toFixed(2)}</span></div>
      </div>

      <div class="card">
        <div class="card-title">🚚 Modalità di ritiro</div>
        <div class="delivery-selector">
          <button class="delivery-opt ${delivery==='ritiro'?'selected':''}" onclick="setDelivery('ritiro')">
            <div class="opt-icon">🏡</div>
            <div class="opt-label">Ritiro in loco</div>
            <div class="opt-sub">Gratuito</div>
          </button>
          <button class="delivery-opt ${delivery==='consegna'?'selected':''}" onclick="setDelivery('consegna')">
            <div class="opt-icon">🚚</div>
            <div class="opt-label">Consegna a domicilio</div>
            <div class="opt-sub">+ €2.00</div>
          </button>
        </div>
        ${delivery === 'consegna' ? `
          <div class="form-row full">
            <div class="form-group">
              <label>Indirizzo di consegna *</label>
              <input id="f-address" type="text" placeholder="Via, numero civico, città">
            </div>
          </div>` : ''}
      </div>

      <div class="card">
        <div class="card-title">👤 I tuoi dati</div>
        <div class="form-row">
          <div class="form-group"><label>Nome *</label><input id="f-fname" type="text"></div>
          <div class="form-group"><label>Cognome *</label><input id="f-lname" type="text"></div>
        </div>
        <div class="form-row full">
          <div class="form-group"><label>Email *</label><input id="f-email" type="email"></div>
        </div>
        <div class="form-row full">
          <div class="form-group"><label>Telefono *</label><input id="f-phone" type="tel" placeholder="es. 333 1234567"></div>
        </div>
        <div class="form-row full">
          <div class="form-group"><label>Note</label><textarea id="f-note"></textarea></div>
        </div>
        <div class="form-actions">
          <button class="btn-back" onclick="view='list';renderShop()">← Torna</button>
          <button class="btn-primary" onclick="submitOrder()">Invia ordine</button>
        </div>
      </div>
    </div>`;
}

function setDelivery(mode){
  window._delivery = mode;
  renderShop();
}

function submitOrder(){
  const fname = document.getElementById('f-fname').value.trim();
  const lname = document.getElementById('f-lname').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  
  if(!fname || !lname || !email || !phone){ 
    alert('Attenzione: compila tutti i campi obbligatori (Nome, Cognome, Email e Telefono).'); 
    return; 
  }

  const delivery = window._delivery || 'ritiro';
  if(delivery === 'consegna' && !document.getElementById('f-address').value.trim()){
    alert('Inserisci l\'indirizzo di consegna.'); return; 
  }

  const inCart  = products.filter(p=>cart[p.id]>0);
  const subtotal = inCart.reduce((s,p)=>s+cart[p.id]*p.price, 0);
  const total   = subtotal + (delivery === 'consegna' ? 2 : 0);
  const address = delivery === 'consegna' ? document.getElementById('f-address').value.trim() : 'Ritiro in loco';
  const now     = new Date();
  
  const order   = {
    id:       'ORD-' + Date.now(),
    date:     now.toLocaleDateString('it-IT'),
    time:     now.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'}),
    name:     fname + ' ' + lname,
    email:    email,
    phone:    document.getElementById('f-phone').value.trim(),
    note:     document.getElementById('f-note').value.trim(),
    delivery: delivery,
    address:  address,
    items:    inCart.map(p=>({name:p.name, emoji:p.emoji, qty:cart[p.id], price:p.price})),
    total:    total,
    status:  'nuovo',
  };

  // Salva ordine su FIREBASE
  db.collection("orders").doc(order.id).set(order)
    .then(() => {
      sendTelegramNotification(order);
      cart = {};
      window._delivery = 'ritiro';
      view = 'success';
      renderShop();
    })
    .catch((e) => alert("Errore durante l'invio: " + e));
}

function resetShop(){
  cart = {};
  view = 'list';
  renderShop();
}

async function sendTelegramNotification(order){
  const righe = order.items.map(i=>`  ${i.emoji} ${i.name} ×${i.qty} — €${(i.qty*i.price).toFixed(2)}`).join('\n');
  const modConsegna = order.delivery === 'consegna' ? `🚚 Consegna\n📍 ${order.address}` : `🏡 Ritiro in loco`;
  const testo = `🌿 Nuovo ordine\n\n👤 ${order.name}\n📞 ${order.phone}\n\n${modConsegna}\n\nProdotti:\n${righe}\n\nTotale: €${order.total.toFixed(2)}`;
  
  try {
    await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ chat_id: TG_CHAT_ID, text: testo })
    });
  } catch(e) {}
}

function renderAuthWall(el){

    <div class="auth-wall">

      <h2>Area riservata</h2>
      <p>Inserisci la password per accedere.</p>
      <div class="auth-form">
        <input id="auth-pw" type="password" onkeydown="if(event.key==='Enter')doAuth()">
        <button class="btn-primary" onclick="doAuth()">Accedi</button>
      </div>

}

function doAuth(){
  if(document.getElementById('auth-pw').value === ADMIN_PASSWORD){
    setAuth(true); renderAdmin();
  } else alert('Password errata.');
}
function logout(){ setAuth(false); renderAdmin(); }

/* --- Firebase Update Functions --- */

function updateProductStatus(id, status) {
  let updateData = {};
  if (status === 'disponibile') { updateData = { available: true, comingSoon: false }; } 
  else if (status === 'prossimamente') { updateData = { available: false, comingSoon: true }; } 
  else if (status === 'nascosto') { updateData = { available: false, comingSoon: false }; }
  
  db.collection("products").doc(id.toString()).update(updateData);
}

function openEditInfo(id){
  const p = products.find(pr => pr.id.toString() === id.toString());
  if(!p) return;
  const root = document.getElementById('product-modal-root');
  root.innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeProductInfo()">
      <div class="modal-box" role="dialog" aria-modal="true" aria-label="Modifica ${p.name}">
        <button class="modal-close" onclick="closeProductInfo()" aria-label="Chiudi">✕</button>
        <div class="modal-body" style="padding-top:1.6rem;">
          <div class="modal-title" style="margin-bottom:1rem;">✏️ ${p.name}</div>

          <div class="form-row full">
            <div class="form-group">
              <label>URL immagine (foto del prodotto)</label>
              <input id="edit-img" type="text" value="${p.img ? p.img.replace(/"/g,'&quot;') : ''}" placeholder="es. img/pomodori-ciliegini.jpg">
            </div>
          </div>
          <div class="form-row full">
            <div class="form-group">
              <label>Descrizione / origine</label>
              <textarea id="edit-desc" placeholder="Es. Coltivati nei nostri campi a due passi da Bologna, raccolti a mano a piena maturazione...">${p.description ? p.description.replace(/</g,'&lt;') : ''}</textarea>
            </div>
          </div>

              <label>Ricette consigliate (nome + link al sito esterno)</label>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Ricetta 1 — nome</label><input id="edit-r1name" type="text" value="${p.recipe1Name ? p.recipe1Name.replace(/"/g,'&quot;') : ''}" placeholder="Es. Pasta ai pomodori ciliegini"></div>
            <div class="form-group"><label>Ricetta 1 — link</label><input id="edit-r1url" type="text" value="${p.recipe1Url ? p.recipe1Url.replace(/"/g,'&quot;') : ''}" placeholder="https://..."></div>
          </div>
          <div class="form-row">

          </div>
          <div class="form-row">

function saveProductInfo(id){
  const img  = document.getElementById('edit-img').value.trim();
  const desc = document.getElementById('edit-desc').value.trim();
  const recipe1Name = document.getElementById('edit-r1name').value.trim();
  const recipe1Url  = document.getElementById('edit-r1url').value.trim();
  const recipe2Name = document.getElementById('edit-r2name').value.trim();
  const recipe2Url  = document.getElementById('edit-r2url').value.trim();
  const recipe3Name = document.getElementById('edit-r3name').value.trim();
  const recipe3Url  = document.getElementById('edit-r3url').value.trim();
  db.collection("products").doc(id.toString()).update({
    img: img,
    description: desc,
    recipe1Name, recipe1Url,
    recipe2Name, recipe2Url,
    recipe3Name, recipe3Url
  }).then(() => closeProductInfo())
    .catch(e => alert("Errore durante il salvataggio: " + e));
}

function syncProductInfo(){
  if(!confirm('Questo aggiornerà descrizione, ricette e immagine di tutti i prodotti con i testi predefiniti, lasciando invariati nome, prezzo e disponibilità. Eventuali schede già modificate a mano verranno sovrascritte. Continuare?')) return;

  const batchUpdates = DEFAULT_PRODUCTS.map(dp => {
    const exists = products.some(p => p.id.toString() === dp.id.toString());
    if(!exists) return Promise.resolve();
    return db.collection("products").doc(dp.id.toString()).update({
      img: dp.img || '',
      description: dp.description || '',
      recipe1Name: dp.recipe1Name || '', recipe1Url: dp.recipe1Url || '',
      recipe2Name: dp.recipe2Name || '', recipe2Url: dp.recipe2Url || '',
      recipe3Name: dp.recipe3Name || '', recipe3Url: dp.recipe3Url || '',
    });
  });

  Promise.all(batchUpdates)
    .then(() => alert('Schede prodotto aggiornate con successo!'))
    .catch(e => alert('Errore durante l\'aggiornamento: ' + e));
}

function openAddProduct(){
  const name = prompt('Nome del prodotto:'); if(!name) return;
  const emoji = prompt('Emoji (es. 🥕):','🥦') || '🥦';
  const price = parseFloat((prompt('Prezzo (€):','2.00')||'').replace(',','.'));
  if(isNaN(price)) return alert('Prezzo non valido.');
  const unit = prompt('Unità (es. kg, pezzo):','kg') || 'kg';
  
  const newId = Date.now();
  db.collection("products").doc(newId.toString()).set({id: newId, name, emoji, price, unit, available: true, comingSoon: false, img: '', description: '', recipe1Name: '', recipe1Url: '', recipe2Name: '', recipe2Url: '', recipe3Name: '', recipe3Url: ''});
}

function updateStatus(id, status){ db.collection("orders").doc(id).update({ status: status }); }
function deleteOrder(id){ if(confirm('Eliminare ordine?')) db.collection("orders").doc(id).delete(); }
