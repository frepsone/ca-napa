<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cà Napà Orticoltura</title>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
<style>
  body { font-family: sans-serif; background: #FAFAF7; color: #1A1A18; }
  .container { max-width: 800px; margin: 0 auto; padding: 20px; }
  .products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
  .product-card { background: white; border: 1px solid #E0DFD6; padding: 15px; border-radius: 12px; }
  .qty-ctrl { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
</style>
</head>
<body>
<div class="container" id="shop-content">
  <p>Caricamento in corso...</p>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDrb2ATcEYDR_-P9btsM7d7YHKnUl_pa-o",
  authDomain: "ca-napa-orto.firebaseapp.com",
  projectId: "ca-napa-orto",
  storageBucket: "ca-napa-orto.firebasestorage.app",
  messagingSenderId: "5836504228",
  appId: "1:5836504228:web:32f691786f0b962fb7fa31",
  measurementId: "G-9L9ZYKEC1F"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let products = [];
let cart = {};

db.collection("products").onSnapshot((snapshot) => {
  products = [];
  snapshot.forEach((doc) => products.push(doc.data()));
  renderShop();
});

function renderShop() {
  const el = document.getElementById('shop-content');
  const avail = products.filter(p => p.available && !p.comingSoon);
  
  el.innerHTML = `
    <h2>🥦 Prodotti disponibili</h2>
    <div class="products-grid">
      ${avail.map(p => `
        <div class="product-card">
          <h3>${p.emoji} ${p.name}</h3>
          <p>€${p.price.toFixed(2)} / ${p.unit}</p>
          <div class="qty-ctrl">
            <button onclick="changeQty(${p.id}, -1)">-</button>
            <span>${cart[p.id] || 0}</span>
            <button onclick="changeQty(${p.id}, 1)">+</button>
          </div>
          ${p.stock !== undefined ? `<p style="font-size:12px">Disponibili: ${p.stock}</p>` : ''}
        </div>
      `).join('')}
    </div>
  `;
}

function changeQty(id, d) {
  const p = products.find(prod => prod.id === id);
  let next = (cart[id] || 0) + d;
  if (next < 0) next = 0;
  if (p.stock !== undefined && next > p.stock) {
    alert('Quantità massima raggiunta!');
    next = p.stock;
  }
  cart[id] = next;
  renderShop();
}
</script>
</body>
</html>
