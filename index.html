<style>
  /* === Reset & base === */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green:     #2D6A4F;
    --green-mid: #40916C;
    --green-lt:  #D8F3DC;
    --earth:     #7C4A1E;
    --earth-lt:  #F5E6DA;
    --cream:     #FAFAF7;
    --ink:       #1A1A18;
    --muted:     #6B6B60;
    --border:    #E0DFD6;
    --white:     #FFFFFF;
    --red-lt:    #FDECEA;
    --red:       #C0392B;
    --amber-lt:  #FEF3CD;
    --amber:     #856404;
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 16px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--cream);
    color: var(--ink);
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* === Layout === */
  .container { max-width: 860px; margin: 0 auto; padding: 0 1.25rem; }

  /* === Header === */
  header {
    background: var(--green);
    color: #fff;
    padding: 1.25rem 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 1px 8px rgba(0,0,0,.15);
  }
  .header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }
  .logo {
    font-family: 'Lora', Georgia, serif;
    font-size: 1.35rem;
    font-weight: 600;
    letter-spacing: -.01em;
    display: flex;
    align-items: center;
    gap: .5rem;
  }
  .logo span { font-size: 1.5rem; }

  /* === Sections === */
  .section { display: none; }
  .section.active { display: block; }

  /* === Shop hero === */
  .shop-hero {
    background: linear-gradient(135deg, var(--green) 0%, var(--green-mid) 100%);
    color: #fff;
    padding: 2.5rem 0 2rem;
    margin-bottom: 2rem;
  }
  .shop-hero h1 {
    font-family: 'Lora', Georgia, serif;
    font-size: 2rem;
    font-weight: 600;
    margin-bottom: .4rem;
  }
  .shop-hero p { color: rgba(255,255,255,.8); font-size: .95rem; }

  /* === Availability notice === */
  .notice {
    display: flex;
    align-items: center;
    gap: .75rem;
    background: var(--green-lt);
    border: 1px solid #95D5B2;
    border-radius: var(--radius-md);
    padding: .75rem 1rem;
    font-size: .875rem;
    color: var(--green);
    margin-bottom: 1.5rem;
  }
  .notice .icon { font-size: 1.25rem; flex-shrink: 0; }

  /* === Product grid === */
  .products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px;
    margin-bottom: 2rem;
  }
  .product-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.1rem 1rem 1rem;
    display: flex;
    flex-direction: column;
    transition: box-shadow .15s;
  }
  .product-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.07); }
  .product-emoji { font-size: 2.2rem; margin-bottom: .6rem; line-height: 1; }
  .product-name { font-weight: 500; font-size: .95rem; margin-bottom: 2px; }
  .product-price { font-size: .85rem; color: var(--green); font-weight: 500; margin-bottom: 2px; }
  .product-unit { font-size: .8rem; color: var(--muted); margin-bottom: .9rem; }
  .qty-ctrl {
    display: flex;
    align-items: center;
    gap: .5rem;
    margin-top: auto;
  }
  .qty-btn {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--cream);
    font-size: 1.1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink);
    line-height: 1;
    transition: background .12s;
  }
  .qty-btn:hover { background: var(--green-lt); border-color: #95D5B2; }
  .qty-num {
    font-size: .9rem;
    font-weight: 500;
    min-width: 24px;
    text-align: center;
  }

  /* === Cart bar === */
  .cart-bar {
    position: sticky;
    bottom: 1rem;
    background: var(--green);
    color: #fff;
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 4px 20px rgba(45,106,79,.35);
    animation: slideUp .2s ease;
    margin-bottom: 1rem;
  }
  @keyframes slideUp { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .cart-total { font-family: 'Lora', serif; font-size: 1.2rem; font-weight: 600; }
  .cart-count { font-size: .8rem; opacity: .8; margin-top: 1px; }
  .btn-cart {
    background: #fff;
    color: var(--green);
    border: none;
    padding: .65rem 1.4rem;
    border-radius: var(--radius-md);
    font-size: .9rem;
    font-weight: 500;
    cursor: pointer;
    transition: background .12s;
  }
  .btn-cart:hover { background: var(--green-lt); }

  /* === Checkout / form === */
  .checkout-wrap { max-width: 600px; margin: 0 auto; padding: 2rem 0; }

    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    margin-bottom: 1.25rem;
  }
